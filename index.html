<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Carla y Ricardo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>

    <div class="invitacion-card">
        <div class="contenido">
            <header>
                <h2 class="nombres">CARLA Y RICARDO</h2>
                
                <div class="divisor-corazon">
                    <svg viewBox="0 0 100 60" width="80">
                        <path d="M30 40 C 10 40, 10 10, 30 10 C 40 10, 50 20, 50 20 C 50 20, 60 10, 70 10 C 90 10, 90 40, 70 40 S 50 60, 50 60 S 50 40, 30 40" fill="none" stroke="#a67c52" stroke-width="2"/>
                    </svg>
                </div>

                <h1 class="titulo-principal">Nuestra boda</h1>
            </header>

            <section class="cuerpo">
                <p class="frase-bienvenida">Queremos que vos seas parte<br>de este día tan especial.</p>
                
                <div class="datos-evento">
                    <p>Te esperamos el día <strong>30 de septiembre</strong>,</p>
                    <p>a las <strong>19:00 hs</strong>, en Calle Cualquiera 123,</p>
                    <p>Cualquier Lugar.</p>
                </div>

                <footer class="rsvp">
                    <p>Confirmar Asistencia al: <strong>11-1234-5678</strong></p>
                </footer>
            </section>
        </div>
    </div>

</body>
</html>
