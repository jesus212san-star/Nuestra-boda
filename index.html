<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación de Boda - Juan y Juana</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="invitation-card">
        <div class="leaf leaf-top-left"></div>
        <div class="leaf leaf-bottom-right"></div>

        <header>
            <h2 class="names-top">JUAN Y JUANA</h2>
            <div class="icon-rings">
                <svg width="60" height="40" viewBox="0 0 100 60">
                    <circle cx="35" cy="30" r="25" stroke="#d4af37" stroke-width="2" fill="none" />
                    <circle cx="65" cy="30" r="25" stroke="#d4af37" stroke-width="2" fill="none" />
                    <path d="M45 30 Q50 20 55 30" stroke="#d4af37" stroke-width="2" fill="none" />
                </svg>
            </div>
            <h1 class="main-title">Nuestra Boda</h1>
        </header>

        <main class="content">
            <p class="intro">Queremos que vos seas parte de este día tan especial.</p>
            
            <div class="details">
                <p>Te esperamos el día <strong>9 de mayo de 2026</strong>,</p>
                <p>a las <strong>04:00 hs</strong>, En la iglesia de san jose villa de allende,</p>
                <p>VILLA DE ALLENDE.</p>
            </div>

            <div class="rsvp">
                <p>Confirmar Asistencia al: <strong>11-1234-5678</strong></p>
            </div>
        </main>
    </div>
</body>
</html>
