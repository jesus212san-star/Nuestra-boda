<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación de Boda - Juan y Juana</title>
    <link rel="stylesheet" href="styles.css">
    <link href="elegante-marco-floral-rosa-pastel-fondo-texturizado-diseno-invitaciones-boda_1288701-13482.jpg" rel="stylesheet">
</head>
<body>
    <div class="invitation-container">
        <div class="invitation-card">
            <header>
                <h2 class="names-top">Juan & Juana</h2>
                <div class="icon-rings">
                    <svg width="60" height="40" viewBox="0 0 100 60">
                        <circle cx="35" cy="30" r="25" stroke="#d4af37" stroke-width="2" fill="none" />
                        <circle cx="65" cy="30" r="25" stroke="#d4af37" stroke-width="2" fill="none" />
                    </svg>
                </div>
                <h1 class="main-title">Nuestra Boda</h1>
            </header>

            <main class="content">
                <p class="intro">Queremos que vos seas parte de este día tan especial.</p>
                
                <div class="details">
                    <p>Te esperamos el día</p>
                    <p class="date">9 de Mayo de 2026</p>
                    <p>a las <strong>19:00 hs</strong></p>
                    <p>Calle Cualquiera 123, Cualquier Lugar.</p>
                </div>

                <div class="rsvp">
                    <p>Confirmar Asistencia al:<br><strong>11-1234-5678</strong></p>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
